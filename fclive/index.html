  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    #iframeContainer {
      width: 100%;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="iframeContainer"></div>

  <script>
    // Replace with your JSON file path
    const jsonURL = 'https://iframe2.bhaiasif647.workers.dev/';

    // Get the ID from query parameter, e.g., ?id=hindi
    const urlParams = new URLSearchParams(window.location.search);
    const iframeId = urlParams.get('id');

    const container = document.getElementById('iframeContainer');
    const loading = document.getElementById('loading');

    fetch(jsonURL)
      .then(response => response.json())
      .then(data => {
        if (!iframeId) {
          loading.innerText = 'No ID specified in URL';
          return;
        }

        const iframeData = data.iframes.find(item => item.id === iframeId);

        if (!iframeData) {
          loading.innerText = `No iframe found for ID: ${iframeId}`;
          return;
        }

        // Create iframe element
        const iframe = document.createElement('iframe');
        iframe.src = iframeData.iframeSrc;
        container.appendChild(iframe);

        // Remove loading text
        loading.style.display = 'none';

        // Optional: hit counter request
        if (iframeData.hit) {
          fetch(iframeData.hit).catch(e => console.warn('Hit request failed', e));
        }
      })
      .catch(err => {
        loading.innerText = 'Failed to load JSON';
        console.error(err);
      });
  </script>
